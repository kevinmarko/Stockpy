[pytest]
# Restrict collection to the tests/ package.
#
# Without this, pytest's default rootdir-recursive discovery would collect any
# top-level ``test_*.py`` — which is exactly how stray dev-scratch scripts
# (e.g. an ad-hoc ``test_fast_render.py`` that runs code at import time) could
# slip into the suite or break collection. Pinning testpaths makes the suite
# boundary explicit and speeds collection by skipping the rest of the tree.
#
# The root-level conftest.py (which inserts the repo root onto sys.path) is
# still loaded: pytest's rootdir is the directory containing this file, and the
# rootdir conftest is always imported regardless of testpaths.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
