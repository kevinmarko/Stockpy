name: CI

# Runs the offline pytest suite on every push to main and every pull request.
# Network/live tests (real Yahoo Finance / Wikipedia / broker calls) are tagged
# `@pytest.mark.network` and deselected here via `-m "not network"` so CI stays
# deterministic and offline. Python is pinned to 3.12 — the only version the
# project supports (setup.sh / launch*.command hard-abort on anything else).
#
# The `webapp` job separately gates the Pilots PWA (webapp/) — typecheck,
# vitest, and a production build — so a break there is caught the same way as
# a Python test failure. It runs offline against the mock API layer
# (VITE_USE_MOCK defaults true), same as `npm run test`/`npm run build` locally.

on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded run when new commits land on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (offline suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline test suite
        run: |
          python -m pytest -m "not network" -v --tb=short \
            --cov --cov-report=term-missing --cov-report=json

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python -c "import json; d=json.load(open('coverage.json')); print(f'Total coverage: {d[\"totals\"][\"percent_covered\"]:.1f}%')" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "coverage.json not found; skipping coverage summary" >> "$GITHUB_STEP_SUMMARY"
          fi

  webapp:
    name: webapp (Pilots PWA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm run test

      - name: Build (typecheck + production build)
        run: npm run build
